<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Busca de CEPs por raio</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="container">
      <div class="card">
        <h1>Busca de CEPs por raio</h1>
        <p class="subtitle">Informe um CEP de origem e um raio (KM) para buscar CEPs próximos.</p>
        <form id="form">
          <input id="cep" placeholder="CEP (ex.: 28635180)" required />
          <input
            id="raioKm"
            type="number"
            step="0.1"
            min="0.1"
            max="200"
            value="5"
            placeholder="Raio em km"
            required
          />
          <button id="submitButton" type="submit">Buscar</button>
        </form>
        <p id="status"></p>
        <ul id="lista"></ul>
      </div>
    </div>
    <script src="./app.js"></script>
  </body>
</html>
